<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .hero-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    .hero-section h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(135deg, var(--text-primary), rgba(var(--text-rgb), 0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-section p {
      font-size: 1.2rem;
      color: rgba(var(--text-rgb), 0.8);
      margin-bottom: 30px;
      max-width: 600px;
    }

    .hero-art {
      margin: 40px 0;
      width: min(100%, 420px);
    }

    .hero-art img {
      max-width: 400px;
      width: 100%;
      display: block;
      margin: 0 auto;
    }

    .cta-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
      align-items: center;
    }

    .cta-buttons .group {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .spotlight-text {
      color: rgba(var(--text-rgb), 0.6);
      font-size: 0.9rem;
      margin-top: 40px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 768px) {
      .hero-section {
        padding-top: 24px;
        padding-bottom: 14px;
      }

      .hero-section h1 {
        font-size: clamp(2.2rem, 9vw, 3rem);
        margin-bottom: 14px;
        line-height: 1.1;
      }

      .hero-section p {
        font-size: 1.05rem;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .hero-art {
        margin: 26px 0 20px;
      }

      .cta-buttons {
        width: 100%;
        gap: 10px;
        margin-top: 18px;
        flex-direction: column;
        align-items: center;
      }

      .cta-buttons .group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        align-items: center;
      }

      .cta-buttons .group .custom-btn {
        width: 100%;
        max-width: 420px;
        justify-content: center;
      }

    }

    @media (max-width: 480px) {
      .hero-section p {
        font-size: 1rem;
      }

      .hero-art {
        margin: 22px 0 16px;
      }

    }
  </style>
</head>

<body class="d-flex flex-column min-vh-100" data-i18n-title="homeTitle"
  style="background-color: var(--bg-primary); color: var(--text-primary);">

  <main class="container px-3 flex-grow-1 d-flex flex-column justify-content-center align-items-center">
    <div class="hero-section">
      <h1 data-i18n="homeHeading">Welcome, I'm Snywy</h1>
      <p data-i18n="homeIntro">A 23-year-old Brazilian creative juggling game development, music production, and graphic
        design. Sometimes
        quiet, always thinking, perpetually caffeinated.</p>

      <div class="hero-art">
        <img src="https://i.imgur.com/E3wHUia.png" class="img-fluid" alt="Creative workspace illustration"
          data-i18n-alt="homeHeroAlt" fetchpriority="high">
      </div>

      <div class="cta-buttons">
        <div class="group">
          <a href="#" onclick="parent.navigateTo('projects'); return false;" class="btn custom-btn primary"
            aria-label="Explore my projects" title="Explore my projects" data-i18n-aria-label="homeCtaProjects"
            data-i18n-title="homeCtaProjects">
            <i class="bi bi-rocket-fill me-2" aria-hidden="true"></i><span data-i18n="homeCtaProjects">Explore My
              Work</span>
          </a>
          <a href="#" onclick="parent.navigateTo('comms'); return false;" class="btn custom-btn primary"
            aria-label="Commission Me" title="Commission Me" data-i18n-aria-label="homeCtaComms"
            data-i18n-title="homeCtaComms">
            <i class="bi bi-brush me-2" aria-hidden="true"></i><span data-i18n="homeCtaComms">Commission Me</span>
          </a>
        </div>



      </div>
  </main>

  <script src="../lang.js"></script>
  <script>
    const pageTranslations = {
      en: {
        homeTitle: 'Home - Snywy',
        homeHeading: "Welcome, I'm Snywy",
        homeIntro: 'A 23-year-old Brazilian Computer Science student and creative juggling game development, music production, and graphic design. Sometimes quiet, always thinking, perpetually caffeinated.',
        homeCtaProjects: 'Explore My Work',
        homeCtaComms: 'Commission Me',
        homeHeroAlt: 'Creative workspace illustration'
      },
      pt: {
        homeTitle: 'Início - Snywy',
        homeHeading: 'Bem-vindo, eu sou Snywy',
        homeIntro: 'Um estudante de Ciência da Computação e criativo brasileiro de 23 anos que equilibra desenvolvimento de jogos, produção musical e design gráfico. Às vezes quieto, sempre pensando e eternamente movido a café.',
        homeCtaProjects: 'Ver Projetos',
        homeCtaComms: 'Contrate-me',
        homeHeroAlt: 'Ilustração de espaço criativo'
      },
      es: {
        homeTitle: 'Inicio - Snywy',
        homeHeading: 'Bienvenido, soy Snywy',
        homeIntro: 'Soy un estudiante brasileño de Ciencias de la Computación y creativo de 23 años que equilibra desarrollo de juegos, producción musical y diseño gráfico. A veces callado, siempre pensando y eternamente alimentado por café.',
        homeCtaProjects: 'Ver mis proyectos',
        homeCtaComms: 'Contrátame',
        homeHeroAlt: 'Ilustración de un espacio creativo'
      }
    };

    function applyLanguageFromParent(language) {
      window.PortfolioLanguage.applyTranslations(pageTranslations, language);
    }

    window.applyLanguageFromParent = applyLanguageFromParent;
    window.PortfolioLanguage.initPageLanguage(pageTranslations);
  </script>

</body>

</html>
