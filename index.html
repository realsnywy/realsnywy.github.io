    <script src="lang.js"></script>

    <script>
        const indexTranslations = {
            en: {
                indexTitle: 'Snywy',
                navHome: 'Home',
                navAbout: 'About',
                navProjects: 'Projects',
                navArsenal: 'Arsenal',
                navSocials: 'Socials',
                footerText: '2026 @ Gabriel "Snywy" Furtado',
                languageSelectorAria: 'Language selector'
            },
            pt: {
                indexTitle: 'Snywy',
                navHome: 'Início',
                navAbout: 'Sobre',
                navProjects: 'Projetos',
                navArsenal: 'Arsenal',
                navSocials: 'Redes',
                footerText: '2026 @ Gabriel "Snywy" Furtado',
                languageSelectorAria: 'Seletor de idioma'
            }
        };

        function getActiveLanguage() {
            return window.PortfolioLanguage.getCurrentLanguage();
        }

        function updateLanguageButtons(language) {
            document.getElementById('lang-en')?.classList.toggle('active', language === 'en');
            document.getElementById('lang-pt')?.classList.toggle('active', language === 'pt');
        }

        function applyLanguage(language) {
            window.PortfolioLanguage.applyTranslations(indexTranslations, language);
            updateLanguageButtons(language);

            const frame = document.getElementById('content-frame');
            if (frame && frame.contentWindow && typeof frame.contentWindow.applyLanguageFromParent === 'function') {
                frame.contentWindow.applyLanguageFromParent(language);
            }
        }

        function setLanguage(language) {
            const normalized = window.PortfolioLanguage.setCurrentLanguage(language);
            applyLanguage(normalized);
        }

        // Navigation function
        function navigateTo(page) {
            const frame = document.getElementById('content-frame');
            frame.src = `pages/${page}.html`;

            const nav = document.getElementById('main-nav');
            if (nav && nav.classList.contains('show')) {
                bootstrap.Collapse.getOrCreateInstance(nav).hide();
            }

            window.scrollTo(0, 0);
        }

        document.getElementById('content-frame').addEventListener('load', () => {
            const language = getActiveLanguage();
            const frameWindow = document.getElementById('content-frame').contentWindow;

            if (frameWindow && typeof frameWindow.applyLanguageFromParent === 'function') {
                frameWindow.applyLanguageFromParent(language);
            }
        });

        // Play a squeak when clicking the logo.
        (function () {
            const logoLink = document.getElementById('logo-home');
            const logoSqueak = document.getElementById('logo-squeak');

            if (!logoLink || !logoSqueak) {
                return;
            }

            logoLink.addEventListener('click', () => {
                logoSqueak.currentTime = 0;
                logoSqueak.play().catch(() => {
                    // Ignore playback errors (e.g. missing file or browser policy).
                });
            });
        })();

        applyLanguage(getActiveLanguage());
    </script>
